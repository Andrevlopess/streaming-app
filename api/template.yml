AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: Streaming app API

Globals:
  Function:
    Timeout: 15
    CodeUri: src
    Runtime: nodejs22.x
    Architectures:
      - arm64
    Environment:
      Variables:
        BUCKET_NAME: !Ref ContentsBucket
        TABLE_NAME: !Ref ContentsTable

Resources:
  ContentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TableName: !Sub "${AWS::StackName}-contents-table"
      AttributeDefinitions:
        - AttributeName: fileKey
          AttributeType: S
      KeySchema:
        - AttributeName: fileKey
          KeyType: HASH

  ContentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-contents-bucket"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - PUT
            AllowedOrigins:
              - 'http://localhost:5173'

  UploadVideoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/functions/s3-handler.handler
      FunctionName: !Sub ${AWS::StackName}-upload-content
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowHeaders:
            - "*"
          AllowMethods:
            - POST
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ContentsBucket
        - S3WritePolicy:
            BucketName: !Ref ContentsBucket
        - DynamoDBWritePolicy:
            TableName: !Ref ContentsTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        TreeShaking: true
        Bundle: true
        Sourcemap: false
        EntryPoints:
          - functions/s3-handler.ts # Entry point for the Lambda function

Outputs:
  UploadVideoFunction:
    Description: UploadVideoFunction Lambda Function ARN
    Value: !GetAtt UploadVideoFunction.Arn
  UploadVideoFunctionIamRole:
    Description: Implicit IAM Role created for UploadVideoFunction
    Value: !GetAtt UploadVideoFunctionRole.Arn
